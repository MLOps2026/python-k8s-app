apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-web
  template:
    metadata:
      labels:
        app: python-web
    spec:
      containers:
      - name: python-web
        image: YOUR_DOCKER_USERNAME/python-web:latest
        ports:
        - containerPort: 5000
