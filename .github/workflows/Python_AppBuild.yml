name: Docker Build

on:
  push:
    branches:
      - feature1

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/python-web:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/python-web:latest
